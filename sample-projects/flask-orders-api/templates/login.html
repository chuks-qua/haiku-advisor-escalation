<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sign in</title>
</head>
<body>
  <h1>Sign in</h1>
  <form method="post" action="/api/auth/login">
    <label>
      Email
      <input type="email" name="email" required />
    </label>
    <label>
      Password
      <input type="password" name="password" required />
    </label>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
